$schema: "https://moonrepo.dev/schemas/project.json"
language: "typescript"
layer: "application"
stack: "frontend"
tags: ["react", "vite"]

dependsOn:
  - "ui"
  - "db"

fileGroups:
  sources:
    - "src/**/*"
    - "index.html"
    - "public/**/*"
  configs:
    - "tsconfig.json"
    - "tsconfig.*.json"
    - "/packages/typescript-config/*.json"

tasks:
  dev:
    command: "vite"
    preset: "server"
    deps:
      - "api:dev"

  build:
    script: "tsc -b && vite build"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
      - "vite.config.ts"
    outputs:
      - "dist"
    deps:
      - "db:build"
      - "api:build"

  start:
    command: "vite preview"
    preset: "server"

  fmt:
    script: "oxfmt ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  fmt-check:
    script: "oxfmt --check ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  lint:
    script: "oxlint ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  lint-fix:
    script: "oxlint --fix ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  typecheck:
    command: "tsc -b --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
