$schema: "https://moonrepo.dev/schemas/project.json"
language: "typescript"
layer: "application"
stack: "backend"
tags: ["hono", "api"]

fileGroups:
  sources:
    - "src/**/*"
  configs:
    - "tsconfig.json"
    - "/packages/typescript-config/*.json"

tasks:
  dev:
    command: "dotenvx run -f ../../.env -- tsx watch src/index.ts"
    preset: "server"

  build:
    command: "tsc"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist"

  start:
    command: "dotenvx run -f ../../.env -- node dist/index.js"
    deps:
      - "~:build"

  db-generate:
    command: "dotenvx run -f ../../.env -- drizzle-kit generate"
    options:
      cache: false
      runInCI: false

  db-migrate:
    command: "dotenvx run -f ../../.env -- drizzle-kit migrate"
    options:
      cache: false
      runInCI: false

  db-push:
    command: "dotenvx run -f ../../.env -- drizzle-kit push"
    options:
      cache: false
      runInCI: false

  lint:
    script: "biome check ."
    inputs:
      - "@group(sources)"
      - "/biome.json"

  lint-fix:
    script: "biome check --write ."
    inputs:
      - "@group(sources)"
      - "/biome.json"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
