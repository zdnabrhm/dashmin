$schema: "https://moonrepo.dev/schemas/project.json"
language: "typescript"
layer: "application"
stack: "backend"
tags: ["hono", "api"]

fileGroups:
  sources:
    - "src/**/*"
  configs:
    - "tsconfig.json"
    - "/packages/typescript-config/*.json"

tasks:
  dev:
    command: "dotenvx run -f ../../.env -- tsx watch src/index.ts"
    preset: "server"
    deps:
      - "db:build"

  build:
    command: "tsc"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist"

  start:
    command: "dotenvx run -f ../../.env -- node dist/index.js"
    deps:
      - "db:build"
      - "~:build"

  fmt:
    script: "oxfmt ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  fmt-check:
    script: "oxfmt --check ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  lint:
    script: "oxlint ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  lint-fix:
    script: "oxlint --fix ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
