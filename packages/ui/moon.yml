$schema: "https://moonrepo.dev/schemas/project.json"
language: "typescript"
layer: "library"
stack: "frontend"
tags: ["react", "ui", "tailwind"]

fileGroups:
  sources:
    - "src/**/*"
  configs:
    - "tsconfig.json"
    - "/packages/typescript-config/*.json"

tasks:
  dev:
    command: "pnpm exec @tailwindcss/cli -i ./src/style.css -o ./dist/style.css --watch"
    preset: "server"

  build:
    command: "pnpm exec @tailwindcss/cli -i ./src/style.css -o ./dist/style.css"
    inputs:
      - "@group(sources)"
    outputs:
      - "dist"

  fmt:
    script: "oxfmt ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  fmt-check:
    script: "oxfmt --check ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  lint:
    script: "oxlint ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  lint-fix:
    script: "oxlint --fix ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
