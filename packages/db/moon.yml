$schema: "https://moonrepo.dev/schemas/project.json"
language: "typescript"
layer: "library"
stack: "backend"
tags: ["database"]

fileGroups:
  sources:
    - "src/**/*"
  configs:
    - "tsconfig.json"
    - "/packages/typescript-config/*.json"

tasks:
  generate:
    command: "dotenvx run -f ../../.env -- drizzle-kit generate"
    options:
      cache: false
      runInCI: false

  migrate:
    command: "dotenvx run -f ../../.env -- drizzle-kit migrate"
    options:
      cache: false
      runInCI: false

  push:
    command: "dotenvx run -f ../../.env -- drizzle-kit push"
    options:
      cache: false
      runInCI: false

  seed:
    command: "dotenvx run -f ../../.env -- tsx src/seed.ts"
    preset: "utility"

  build:
    command: "tsc"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
    outputs:
      - "dist"

  fmt:
    script: "oxfmt ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  fmt-check:
    script: "oxfmt --check ."
    inputs:
      - "@group(sources)"
      - "/.oxfmtrc.json"

  lint:
    script: "oxlint ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  lint-fix:
    script: "oxlint --fix ."
    inputs:
      - "@group(sources)"
      - "/.oxlintrc.json"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(configs)"
